<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            color: white;
            text-align: center;
        }

        .container{
            max-width: 600px;
            padding: 20px;
        }

        h1{
            font-size: 120px;
            color: #ff4b5c;
        }

        h2{
            font-size: 32px;
            margin-bottom: 15px;
        }

        p{
            font-size: 18px;
            margin-bottom: 25px;
            color: #dcdcdc;
        }

        a{
            display: inline-block;
            text-decoration: none;
            background: #ff4b5c;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 18px;
            transition: 0.3s;
        }

        a:hover{
            background: #ff1e38;
            transform: scale(1.05);
        }

        .ghost{
            font-size: 70px;
            margin-bottom: 15px;
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float{
            0%{
                transform: translateY(0);
            }
            50%{
                transform: translateY(-10px);
            }
            100%{
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="ghost">👻</div>
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you are looking for might have been removed or is temporarily unavailable.</p>
        <a href="/">Go Back Home</a>
    </div>

</body>
</html>
