<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Query in css</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: aqua;
    }
    .wrapper {
      display: flex;
      flex-direction: column; /* stack h2 above container */
      align-items: center;
      gap: 15px; /* space between heading & container */
    }
    h2 {
      color: black;
    }
    .container {
      width: 80vh;
      height: 60vh;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: purple;
      gap: 10px;
    }
    .box {
      border: 0.5px solid black;
      width: 15vh;
      height: 40vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      background-color: orangered;
      color: white;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h2>This is Media Query</h2>
    <div class="container">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
    </div>
  </div>
</body>
</html>
