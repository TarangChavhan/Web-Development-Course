<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query in css</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container{
            width: 80vh;
            height: 60vh;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: purple
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 16px;
            height: 100vh;
            background-color: aqua;
        }
        .box{
            border: 0.5px solid black;
            margin: 6px;
            width: 17vh;
            height: 40vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            background-color: orangered;
            color: white;         
        }
        h2{
            text-align: center;
            color: white;
            border: 1px solid black;
            margin-bottom: 16px;
            background-color: black;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        @media screen and (orientation: portrait){
            body{
                background-color: chartreuse;
            }
        }
        @media only screen and (max-width: 455px) {
            .container{
                background-color: red;
            }            
        }
    </style>
</head>
<body>
    <div>
        <h2>This is Media Query </h2>
        <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div> 
    </div>   
</body>
</html>
