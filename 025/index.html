<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box in CSS</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: brown;
        }
        .container{
            border: 2px solid black;
            height: 100vh;
            display: flex;
            background-color: red;
            justify-content: center;
            align-items: center;
            gap: 10px 12px;
        }
        .items{
            border: 1px solid black;
            width: 30px;
            height: 90px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
        <div class="items"></div>
    </div>
</body>
</html>
